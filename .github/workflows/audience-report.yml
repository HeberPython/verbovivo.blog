name: Verbo Vivo Audience Report

on:
  workflow_dispatch:
  schedule:
    # 13:30 UTC = 10:30 em Sao Paulo.
    - cron: "30 13 * * 1"

concurrency:
  group: verbo-vivo-audience-report
  cancel-in-progress: false

jobs:
  audience-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      id-token: write
    env:
      HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT }}
      HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_DIR: ${{ secrets.HOSTINGER_FTP_DIR }}
      HOSTINGER_ANALYTICS_REMOTE_LOG: _private/analytics-events.jsonl
      HOSTINGER_ANALYTICS_LOCAL_LOG: automation/_logs/hostinger/first-party-analytics.jsonl
      HOSTINGER_ACCESS_LOG_PATH: automation/_logs/hostinger
      GSC_SITE_URL: https://verbovivo.blog/
      GSC_OAUTH_CLIENT_SECRETS: automation/_credentials/search-console-oauth-client.json
      GSC_OAUTH_TOKEN: automation/_credentials/search-console-oauth-token.json
      GA4_MEASUREMENT_ID: G-KRH6PSKSMV
      GOOGLE_ADSENSE_CLIENT: ca-pub-5233928852442075

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Prepare Search Console credentials
        shell: python
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_OAUTH_CLIENT_JSON: ${{ secrets.GSC_OAUTH_CLIENT_JSON }}
          GSC_OAUTH_TOKEN_JSON: ${{ secrets.GSC_OAUTH_TOKEN_JSON }}
        run: |
          from pathlib import Path
          import os

          credentials = Path("automation/_credentials")
          credentials.mkdir(parents=True, exist_ok=True)
          service_account = os.environ.get("GSC_SERVICE_ACCOUNT_JSON", "").strip()
          client = os.environ.get("GSC_OAUTH_CLIENT_JSON", "").strip()
          token = os.environ.get("GSC_OAUTH_TOKEN_JSON", "").strip()
          if service_account:
              service_account_path = credentials / "search-console-service-account.json"
              service_account_path.write_text(service_account, encoding="utf-8")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as github_env:
                  github_env.write(f"GOOGLE_APPLICATION_CREDENTIALS={service_account_path.as_posix()}\n")
          if client:
              (credentials / "search-console-oauth-client.json").write_text(client, encoding="utf-8")
          if token:
              (credentials / "search-console-oauth-token.json").write_text(token, encoding="utf-8")

      - name: Generate audience report
        run: python -m automation.editorial_agent.audience_report > audience-report.md

      - name: Add report to workflow summary
        shell: bash
        run: |
          {
            echo "## Verbo Vivo Audience Report"
            echo
            cat audience-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("audience-report.md", "utf8");
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Relatorio semanal Verbo Vivo - ${date}`,
              body: report.slice(0, 60000)
            });

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: audience-report
          path: audience-report.md
